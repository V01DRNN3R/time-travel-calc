<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
  --bg:#f6f7fb;
  --panel:#fff;
  --text:#111;
  --accent:#0066ff;
}

body.dark{
  --bg:#0e1220;
  --panel:#151a2e;
  --text:#fff;
  --accent:#4da6ff;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
}

#panel{
  width:320px;
  background:var(--panel);
  padding:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

body.dark input,body.dark button{
  background:#222a44;
  color:#fff;
  border:1px solid #333b5c;
}

button{
  background:var(--accent);
  color:#fff;
  border:none;
}

#map{flex:1;height:100vh}

#output{
  margin-top:10px;
  padding:10px;
  background:rgba(0,0,0,0.05);
  border-radius:10px;
}

body.dark #output{
  background:rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div id="panel">
<input id="from" placeholder="From">
<input id="to" placeholder="To">

<button id="go">Start navigation</button>
<button id="dark">Toggle dark mode</button>
<button id="car">Car mode</button>
<button id="fs">Fullscreen</button>

<div id="output">Ready</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map=L.map("map").setView([52.37,4.9],7);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let routeLayer,marker,steps=[],coords=[],watchId,currentStep=0,car=false;

function speak(t){
  const u=new SpeechSynthesisUtterance(t);
  u.lang=navigator.language||"en-US";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function dist(a,b){
  return Math.hypot(a[0]-b[0],a[1]-b[1]);
}

async function geo(q){
  let r=await fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(q));
  let d=await r.json();
  return [+d[0].lat,+d[0].lon];
}

async function route(a,b){
  let r=await fetch(`https://router.project-osrm.org/route/v1/driving/${a[1]},${a[0]};${b[1]},${b[0]}?overview=full&geometries=geojson&steps=true`);
  let d=await r.json();
  return d.routes[0];
}

function snap(p){
  let best=null,min=999;
  coords.forEach(c=>{
    let d=dist(p,[c[1],c[0]]);
    if(d<min){min=d;best=c;}
  });
  return best?[best[1],best[0]]:p;
}

function move(m,p){
  let s=m.getLatLng(),t=p,start=performance.now();
  function a(n){
    let k=Math.min((n-start)/300,1);
    m.setLatLng([s.lat+(t[0]-s.lat)*k,s.lng+(t[1]-s.lng)*k]);
    if(k<1)requestAnimationFrame(a);
  }
  requestAnimationFrame(a);
}

function instruction(s){
  let m=s.maneuver;
  let r=s.name?`onto ${s.name}`:"";
  if(m.type==="depart")return"Start driving "+r;
  if(m.type==="turn")return"Turn "+(m.modifier||"")+" "+r;
  if(m.type==="continue")return"Continue "+r;
  if(m.type==="merge")return"Merge "+r;
  if(m.type==="arrive")return"Arrived";
  return"Proceed "+r;
}

function update(p){
  if(!steps.length)return;

  let s=steps[currentStep];
  if(!s)return;

  let c=s.maneuver.location;
  let d=dist(p,[c[1],c[0]]);

  let txt=instruction(s);

  if(d<0.0006){
    speak(txt);
    currentStep++;
  }

  let left=s.distance>1000?(s.distance/1000).toFixed(1)+" km":Math.round(s.distance)+" m";

  output.innerHTML=`<b>🧭 ${txt}</b><br>In ${left}`;
}

function watch(){
  watchId=navigator.geolocation.watchPosition(pos=>{
    let p=[pos.coords.latitude,pos.coords.longitude];
    let s=snap(p);

    if(!marker){
      marker=L.circleMarker(s,{radius:8,color:"#0066ff"}).addTo(map);
    }else move(marker,s);

    if(car)map.setView(s,18);

    update(s);
  },null,{enableHighAccuracy:true});
}

async function start(){
  let a=await geo(from.value);
  let b=await geo(to.value);

  let r=await route(a,b);

  steps=r.legs[0].steps;
  coords=r.geometry.coordinates;

  if(routeLayer)map.removeLayer(routeLayer);

  routeLayer=L.geoJSON(r.geometry,{style:{color:"#0066ff",weight:5}}).addTo(map);
  map.fitBounds(routeLayer.getBounds());

  watch();
}

go.onclick=start;

dark.onclick=()=>document.body.classList.toggle("dark");

car.onclick=()=>{
  car=!car;
  map.setZoom(car?18:7);
};

fs.onclick=()=>{
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  }else{
    document.exitFullscreen();
  }
};
</script>

</body>
</html>
