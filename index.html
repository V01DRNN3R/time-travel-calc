<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Route Planner Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body { margin:0; font-family: Arial, sans-serif; display:flex; flex-direction:column; min-height:100vh; }
#topbar { padding:12px; background:#222; color:white; position:relative; }
#controls { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-start; }
.control-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; width:100%; }
.control-row input { padding:10px; width:calc(100% - 100px); min-width:180px; border:1px solid #444; border-radius:4px; background:#111; color:white; }
.control-row button { padding:10px 12px; border:none; border-radius:4px; background:#0078d4; color:white; cursor:pointer; }
button.small { background:#555; }
#waypoints { width:100%; display:flex; flex-direction:column; gap:8px; }
#map { flex:1; min-height:360px; }
#info { padding:12px; background:#111; color:#eee; font-size:14px; }
#result { max-width:100%; }
.autocomplete-list { position:absolute; z-index:1000; background:#000000; border:1px solid #000000; max-height:220px; overflow:auto; width:320px; box-shadow:0 4px 12px rgba(0,0,0,.25); border-radius:4px; }
.autocomplete-item { padding:10px; cursor:pointer; border-bottom:1px solid #000000; }
.autocomplete-item:last-child { border-bottom:none; }
.autocomplete-item:hover { background:#2e2e2e; }
.route-marker { background:#0078d4; color:white; font-weight:700; text-align:center; line-height:28px; border-radius:50%; width:28px; height:28px; border:2px solid white; }
@media (max-width:720px) { #controls { flex-direction:column; } .control-row input { width:100%; } }
</style>
</head>
<body>
<div id="topbar">
    <div id="controls">
        <div class="control-row">
            <input id="start" placeholder="Start location" autocomplete="off">
            <button id="use-location" type="button">📍 My Location</button>
        </div>
        <div class="control-row">
            <input id="end" placeholder="End location" autocomplete="off">
            <button id="add-waypoint" class="small" type="button">+ Stop</button>
        </div>
        <div id="waypoints"></div>
        <div class="control-row">
            <button id="route-btn" type="button">Route</button>
            <button id="clear-btn" type="button" class="small">Clear</button>
        </div>
    </div>
    <div id="search-overlay" class="autocomplete-list" hidden></div>
</div>
<div id="map"></div>
<div id="info">
    <div id="result">Enter start and end locations, then press Route.</div>
</div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([52.5, 6.5], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

let routeLine;
let markers = [];
let waypointRows = [];
let searchTimeout;
const routerEndpoints = [
    'https://router.project-osrm.org/route/v1/driving/',
    'https://routing.openstreetmap.de/routed-car/route/v1/driving/'
];

function createLocationRow() {
    const row = document.createElement('div');
    row.className = 'control-row';

    const input = document.createElement('input');
    input.placeholder = 'Stop';
    input.autocomplete = 'off';
    input.addEventListener('input', () => scheduleSearch(input));
    input.addEventListener('focus', () => showSearchResults(input));
    input.addEventListener('blur', () => setTimeout(hideSearchResults, 150));
    row.appendChild(input);

    const remove = document.createElement('button');
    remove.textContent = 'Remove';
    remove.className = 'small';
    remove.type = 'button';
    remove.addEventListener('click', () => {
        row.remove();
        waypointRows = waypointRows.filter(r => r !== row);
    });
    row.appendChild(remove);

    waypointRows.push(row);
    return row;
}

function scheduleSearch(input) {
    const query = input.value.trim();
    if (query.length < 3) {
        hideSearchResults();
        return;
    }
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => searchAddress(query, input), 250);
}

async function searchAddress(query, input) {
    try {
        const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=6&q=${encodeURIComponent(query)}`;
        const res = await fetch(url, { headers: { 'Accept-Language':'en' } });
        const results = await res.json();
        if (!results || !results.length) {
            hideSearchResults();
            return;
        }
        showAutocomplete(results, input);
    } catch (err) {
        hideSearchResults();
    }
}

function showAutocomplete(results, input) {
    const overlay = document.getElementById('search-overlay');
    overlay.innerHTML = '';
    overlay.style.width = `${input.offsetWidth}px`;
    overlay.hidden = false;

    const parentRect = overlay.parentElement.getBoundingClientRect();
    const rect = input.getBoundingClientRect();
    overlay.style.left = `${rect.left - parentRect.left}px`;
    overlay.style.top = `${rect.bottom - parentRect.top}px`;

    results.forEach(item => {
        const entry = document.createElement('div');
        entry.className = 'autocomplete-item';
        entry.textContent = item.display_name;
        entry.addEventListener('mousedown', () => {
            input.value = item.display_name;
            input.dataset.lat = item.lat;
            input.dataset.lon = item.lon;
            hideSearchResults();
        });
        overlay.appendChild(entry);
    });
}

function showSearchResults(input) {
    if (input.value.trim().length >= 3) {
        scheduleSearch(input);
    }
}

function hideSearchResults() {
    const overlay = document.getElementById('search-overlay');
    overlay.hidden = true;
}

async function geocode(query) {
    const coords = parseCoordinates(query);
    if (coords) return coords;
    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data.length) throw new Error('Location not found: ' + query);
    return [parseFloat(data[0].lon), parseFloat(data[0].lat)];
}

function parseCoordinates(text) {
    const parts = text.split(/[, ]+/).map(p => p.trim()).filter(Boolean);
    if (parts.length === 2 && parts.every(p => /^-?\d+(\.\d+)?$/.test(p))) {
        const lat = parseFloat(parts[0]);
        const lon = parseFloat(parts[1]);
        if (Math.abs(lat) <= 90 && Math.abs(lon) <= 180) return [lon, lat];
    }
    return null;
}

function getRouteFields() {
    return [
        document.getElementById('start'),
        ...waypointRows.map(row => row.querySelector('input')),
        document.getElementById('end')
    ].filter(input => input && input.value.trim());
}

async function buildCoordinates() {
    const inputs = getRouteFields();
    if (inputs.length < 2) throw new Error('Please enter both start and end locations.');
    const coords = [];
    for (const input of inputs) {
        const value = input.value.trim();
        const lat = input.dataset.lat;
        const lon = input.dataset.lon;
        if (lat && lon) {
            coords.push([parseFloat(lon), parseFloat(lat)]);
            continue;
        }
        coords.push(await geocode(value));
    }
    return coords;
}

async function calculateRoute() {
    try {
        setMessage('Routing…');
        clearRoute();
        const coords = await buildCoordinates();
        const coordString = coords.map(c => `${c[0]},${c[1]}`).join(';');

        let routeData;
        for (const endpoint of routerEndpoints) {
            const url = `${endpoint}${coordString}?overview=full&geometries=geojson`;
            const res = await fetch(url);
            if (!res.ok) continue;
            const data = await res.json();
            if (data.code === 'Ok' && data.routes && data.routes.length) {
                routeData = data.routes[0];
                break;
            }
        }
        if (!routeData) throw new Error('Routing failed. Try different locations or refresh the page.');

        routeLine = L.geoJSON(routeData.geometry, { style: { color:'#0078d4', weight:5 } }).addTo(map);
        map.fitBounds(routeLine.getBounds(), { padding:[24,24] });

        coords.forEach((coord, index) => {
            const icon = L.divIcon({ className:'route-marker', html:`<span>${index+1}</span>`, iconSize:[28,28], iconAnchor:[14,28] });
            const marker = L.marker([coord[1], coord[0]], { icon }).addTo(map);
            markers.push(marker);
        });

        const km = (routeData.distance / 1000).toFixed(2);
        const duration = Math.round(routeData.duration / 60);
        setMessage(`➡️ One way: ${km} km · ${formatTime(duration)}<br>🔁 Round trip: ${(km * 2).toFixed(2)} km · ${formatTime(duration * 2)}`);
    } catch (err) {
        alert(err.message || err);
        setMessage('Route failed. Check your start/end and try again.');
    }
}

function clearRoute() {
    if (routeLine) map.removeLayer(routeLine);
    markers.forEach(marker => map.removeLayer(marker));
    markers = [];
}

function setMessage(message) {
    document.getElementById('result').innerHTML = message;
}

function formatTime(minutes) {
    const hours = Math.floor(minutes / 60);
    const mins = minutes % 60;
    return hours ? `${hours}h ${mins}m` : `${mins}m`;
}

function useLocation() {
    if (!navigator.geolocation) {
        alert('Geolocation is not supported by your browser.');
        return;
    }
    navigator.geolocation.getCurrentPosition(position => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const startInput = document.getElementById('start');
        startInput.value = `${lat},${lon}`;
        map.setView([lat, lon], 13);
        setMessage('Start location set to your current position.');
    }, () => {
        alert('Unable to access your location.');
    });
}

function addWaypointRow() {
    const row = createLocationRow();
    document.getElementById('waypoints').appendChild(row);
}

function clearAll() {
    document.getElementById('start').value = '';
    document.getElementById('end').value = '';
    waypointRows.forEach(row => row.remove());
    waypointRows = [];
    clearRoute();
    setMessage('Enter start and end locations, then press Route.');
}

const startInput = document.getElementById('start');
const endInput = document.getElementById('end');
[startInput, endInput].forEach(input => {
    input.addEventListener('input', () => scheduleSearch(input));
    input.addEventListener('focus', () => showSearchResults(input));
    input.addEventListener('blur', () => setTimeout(hideSearchResults, 150));
});

document.getElementById('add-waypoint').addEventListener('click', addWaypointRow);
document.getElementById('route-btn').addEventListener('click', calculateRoute);
document.getElementById('clear-btn').addEventListener('click', clearAll);
document.getElementById('use-location').addEventListener('click', useLocation);
</script>
</body>
</html>
